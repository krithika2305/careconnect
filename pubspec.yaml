name: careconnect_app
description: "AI Dementia Care Platform"
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  supabase_flutter: ^2.5.6
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0

  flutter_local_notifications: ^17.1.2

  workmanager:
    git:
      url: https://github.com/fluttercommunity/flutter_workmanager.git
      path: workmanager
      ref: main

  http: ^1.2.0

  geolocator: ^11.0.0
  permission_handler: ^12.0.3

  image_picker: ^1.2.2
  path_provider: ^2.1.3

  fl_chart: ^0.66.0

  record: ^6.2.0

  flutter_blue_plus: ^1.32.7

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/