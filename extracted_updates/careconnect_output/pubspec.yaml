name: careconnect_app
description: "AI Dementia Care Platform"
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # Supabase & auth
  supabase_flutter: ^2.5.6

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # HTTP (replaces tflite_flutter for AI calls)
  http: ^1.2.0

  # Location / permissions
  geolocator: ^11.0.0
  permission_handler: ^11.3.0

  # Media
  image_picker: ^1.2.2

  # Charts
  fl_chart: ^0.66.0

  # Audio (kept for future features)
  record: ^6.2.0

  # Bluetooth (kept for wearable integration)
  flutter_blue_plus: ^1.32.7

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  # NOTE: assets/models/ directory is no longer needed (model lives on backend).
  # You may remove it safely.
